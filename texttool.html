<!DOCTYPE html>
<html lang="">
<!--Original source: https://github.com/Pinsplash/texttool-->
<!--Last time I remembered to update the build date: March 24, 2026-->
<head>
    <title></title>
</head>
<body>
    <form name="form" class="form">
        <table class="copyabletable">
            <tr>
                <td>
                    <label for="targetmodeselect" title="Select what text to target with the effect">Target:</label>
                </td>
                <td>
                    <label>
                        <select name="targetmodeselect" id="targetmodeselect">
                            <option value="alltext">All Text</option>
                            <option value="duplicatelines">Duplicate Lines</option>
                            <option value="emptylines">Empty Lines</option>
                            <option value="evenlines">Even Lines</option>
                            <option value="withtokens">Lines with Tokens</option>
                            <option value="without_tokens">Lines without Tokens</option>
                            <option value="oddlines">Odd Lines</option>
                            <option value="repeatlines">Repeat Lines</option>
                            <option value="uniquelines">Unique Lines</option>
                        </select>
                    </label>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="effectselect" title="Select effect to apply to targeted text">Effect:</label>
                </td>
                <td>
                    <label>
                        <select name="effectselect" id="effectselect">
                            <option value="copy">Copy (Debug)</option>
                            <option value="prefixsuffix">Add Prefix/Suffix</option>
                            <option value="allcombos">All Combinations</option>
                            <option value="camelseparate">Camel Case Separate</option>
                            <option value="clear">Clear</option>
                            <option value="colext">Column Extract</option>
                            <option value="delete">Delete</option>
                            <option value="insertnewline">Insert Newline</option>
                            <option value="makelowercase">Make Lowercase</option>
                            <option value="makeuppercase">Make Uppercase</option>
                            <option value="numberlines">Number Lines</option>
                            <option value="tabbrackets">Re-Tab By Brackets</option>
                            <option value="replacetable">Replace Table</option>
                            <option value="reverse">Reverse Lines</option>
                            <option value="sort">Sort Alphabetically</option>
                            <option value="sortnumstrings">Sort by # Instances of Substring</option>
                            <option value="tabtable">Tab Table</option>
                        </select>
                    </label>
                </td>
            </tr>
            <tr class="inputtd">
                <td>
                    <label for="input" title="Put original text here">Input:</label>
                </td>
                <td>
                    <label>
                        <textarea id="input" class="inputeventlisten" rows="10" cols="50"></textarea>
                    </label>
                </td>
            </tr>
            <tr class="replacetabletd intermediary" style="display: none">
                <td>
                    <label for="replacetable" title="Batch find and replace. Instances of odd lines will be replaced with the next line down.">Table:</label>
                </td>
                <td>
                    <label>
                        <textarea id="replacetable" class="inputeventlisten" rows="10" cols="50"></textarea>
                    </label>
                </td>
            </tr>
            <tr class="desiredtabwidthtd intermediary" style="display: none">
                <td>
                    <label for="desiredtabwidth" title="When working with tabs, the character width of the tabs. Commonly 2, 4, or 8.">Desired Tab Width:</label>
                </td>
                <td>
                    <label>
                        <textarea id="desiredtabwidth" class="inputeventlisten" rows="1" cols="50">4</textarea>
                    </label>
                </td>
            </tr>
            <tr class="colnotd intermediary" style="display: none">
                <td>
                    <label for="colno" title="When interpreting text as a table, which column to extract">Column Number:</label>
                </td>
                <td>
                    <label>
                        <textarea id="colno" class="inputeventlisten" rows="1" cols="50"></textarea>
                    </label>
                </td>
            </tr>
            <tr class="openbracketstd intermediary" style="display: none">
                <td>
                    <label for="openbrackets" title="Characters that indicate an opening bracket.">Opening Bracket Chars:</label>
                </td>
                <td>
                    <label>
                        <textarea id="openbrackets" class="inputeventlisten" rows="1" cols="50">([{</textarea>
                    </label>
                </td>
            </tr>
            <tr class="closebracketstd intermediary" style="display: none">
                <td>
                    <label for="closebrackets" title="Characters that indicate a closing bracket.">Closing Bracket Chars:</label>
                </td>
                <td>
                    <label>
                        <textarea id="closebrackets" class="inputeventlisten" rows="1" cols="50">)]}</textarea>
                    </label>
                </td>
            </tr>
            <tr class="delimtd intermediary" style="display: none">
                <td>
                    <label for="delim" title="A character or string that indicates where to separate text">Delimiter:</label>
                </td>
                <td>
                    <label>
                        <textarea id="delim" class="inputeventlisten" rows="1" cols="50"></textarea>
                    </label>
                </td>
            </tr>
            <tr class="tokenstd intermediary" style="display: none">
                <td>
                    <label for="tokens">Tokens:</label>
                </td>
                <td>
                    <label>
                        <textarea id="tokens" class="inputeventlisten" rows="10" cols="50"></textarea>
                    </label>
                </td>
            </tr>
            <tr class="prefixtd intermediary" style="display: none">
                <td>
                    <label for="prefix" title="Prefix to add to text">Prefix:</label>
                </td>
                <td>
                    <label>
                        <textarea id="prefix" class="inputeventlisten" rows="1" cols="50"></textarea>
                    </label>
                </td>
            </tr>
            <tr class="suffixtd intermediary" style="display: none">
                <td>
                    <label for="suffix" title="Suffix to add to text">Suffix:</label>
                </td>
                <td>
                    <label>
                        <textarea id="suffix" class="inputeventlisten" rows="1" cols="50"></textarea>
                    </label>
                </td>
            </tr>
            <tr class="startattd intermediary" style="display: none">
                <td>
                    <label for="startat" title="When counting something, the number to start from">Start at:</label>
                </td>
                <td>
                    <label>
                        <textarea id="startat" class="inputeventlisten" rows="1" cols="50"></textarea>
                    </label>
                </td>
            </tr>
            <!--
            <tr class="matchlinetd intermediary" style="display: none">
                <td>
                    <input type="checkbox" class="matchline inputeventlisten">
                    <label for="matchline" title="When comparing or finding text, the entire line must match the target string">Match Whole Line</label><br>
                </td>
            </tr>
            -->
            <tr>
                <td>
                    <label for="output" title="Edited text appears here!">Output:</label>
                </td>
                <td>
                    <label>
                        <textarea id="output" rows="10" cols="50"></textarea>
                    </label>
                </td>
            </tr>
        </table>
        <button type="button" onclick="AddToChain(this)">Add</button>
    </form>
    <script>
        AddListeners();
        let g_ModNum;
        function AddListeners() {
            let InputListenElems = document.getElementsByClassName("inputeventlisten");
            for (const elem of InputListenElems) {
                elem.addEventListener("input", UpdateAllTextBoxes);
            }
            let EffectSelectElems = document.getElementsByClassName("effectselect");
            for (const elem of EffectSelectElems) {
                elem.onchange = UpdateParameters;
            }
            let TargetModeSelectElems = document.getElementsByClassName("targetmodeselect");
            for (const elem of TargetModeSelectElems) {
                elem.onchange = UpdateParameters;
            }
        }
        function UpdateAllTextBoxes() {
            UpdateTextBoxes(0);
        }
        function AddToChain(ModTable) {
            let TableElems = document.getElementsByClassName("copyabletable");
            let LastTable = TableElems[TableElems.length - 1];
            let Clone1 = LastTable.cloneNode(true);
            document.getElementsByClassName("form")[0].appendChild(Clone1);
            let Clone2 = ModTable.cloneNode(true);
            document.getElementsByClassName("form")[0].appendChild(Clone2);
            //delete the input box we just cloned - modifiers after the first use the previous mod's output as their input
            let InputElems = document.getElementsByClassName("inputtd");
            if (InputElems.length > 1) {
                let ElemNum = InputElems.length - 1;
                let LastInput = InputElems[ElemNum];
                LastInput.remove();
            }
            AddListeners();
            //and always delete old add buttons
            ModTable.remove();
        }
        function GetElementInTable(ModNum, ElementName) {
            let Table = document.getElementsByClassName("copyabletable")[ModNum];
            /*
            if (table) {
                console.log("copyabletable #" + iter + " exists");
            } else {
                console.log("copyabletable #" + iter + " did not exist");
            }
            if (elem) {
                console.log("element " + ElementName + " exists");
            } else {
                console.log("element " + ElementName + " did not exist");
            }
            */
            return Table.getElementsByClassName(ElementName)[0];
        }
        function UpdateParameters() {
            let TableElems = document.getElementsByClassName("copyabletable");
            for (let iMod = 0; iMod < TableElems.length; iMod++) {
                //some modes have their own intermediary boxes to set how they work
                //hide everything by default, re-show based on mode
                let IntermedElems = TableElems[iMod].getElementsByClassName("intermediary");
                for (const elem of IntermedElems) {
                    elem.style.display = "none";
                }

                let Effect = GetElementInTable(iMod, "effectselect");
                switch (Effect.value) {
                    case "prefixsuffix":
                        GetElementInTable(iMod, "prefixtd").style.display = "table-row";
                        GetElementInTable(iMod, "suffixtd").style.display = "table-row";
                        break;
                    case "colext":
                        GetElementInTable(iMod, "colnotd").style.display = "table-row";
                        GetElementInTable(iMod, "delimtd").style.display = "table-row";
                        break;
                    case "replacetable":
                        GetElementInTable(iMod, "replacetabletd").style.display = "table-row";
                        break;
                    case "insertnewline":
                    case "allcombos":
                        GetElementInTable(iMod, "delimtd").style.display = "table-row";
                        break;
                    case "sortnumstrings":
                        GetElementInTable(iMod, "tokenstd").style.display = "table-row";
                        break;
                    case "tabtable":
                        GetElementInTable(iMod, "desiredtabwidthtd").style.display = "table-row";
                        GetElementInTable(iMod, "delimtd").style.display = "table-row";
                        break;
                    case "tabbrackets":
                        GetElementInTable(iMod, "openbracketstd").style.display = "table-row";
                        GetElementInTable(iMod, "closebracketstd").style.display = "table-row";
                        break;
                    case "numberlines":
                        GetElementInTable(iMod, "delimtd").style.display = "table-row";
                        GetElementInTable(iMod, "startattd").style.display = "table-row";
                        break;
                    default:
                        break;
                }
                UpdateTextBoxes(iMod);
            }
            let TargetModeElems = document.getElementsByClassName("targetmodeselect");
            for (let iElem = 0; iElem < TargetModeElems.length; iElem++) {
                let TargetMode = GetElementInTable(iElem, "targetmodeselect");
                switch (TargetMode.value) {
                    case "withtokens":
                    case "without_tokens":
                        GetElementInTable(iElem, "tokenstd").style.display = "table-row";
                        break;
                    default:
                        break;
                }
                UpdateTextBoxes(iElem);
            }
        }
        function UpdateTextBoxes(ModNum) {
            let TableElems = document.getElementsByClassName("copyabletable");
            let TargetModeSelectElems = document.getElementsByClassName("targetmodeselect");
            for (let iMod = ModNum; iMod < TableElems.length; iMod++) {
                let Output = GetElementInTable(iMod, "output");
                let Input;
                //modifiers after the first use the previous mod's output as their input
                if (iMod === 0) {
                    Input = GetElementInTable(iMod, "input");
                } else {
                    Input = GetElementInTable(iMod - 1, "output");
                }

                let Pieces = Input.value.split("\n");
                let TargetMode = TargetModeSelectElems[iMod];
                let LinesToEdit = GetTargetLineNums(Pieces, TargetMode, iMod);
                Output.value = EditLines(Pieces, iMod, LinesToEdit).join("\n");
            }
        }
        //lines not targeted by the target mode are left undisturbed
        //create a list of line numbers we want to edit
        function GetTargetLineNums(Input, TargetMode, ModNum) {
            let TargetFunction;
            let Numbers = [];
            switch (TargetMode.value) {
                case "duplicatelines":
                    TargetFunction = (Line, ModNum, Input) => { return Input.indexOf(Line, Input.indexOf(Line) + 1) >= 0 && Line !== "<BR>" };
                    break;
                case "repeatlines":
                    TargetFunction = (Line, ModNum, Input, LineNum) => { return Input.indexOf(Line) !== LineNum && Line !== "<BR>" };
                    break;
                case "uniquelines":
                    TargetFunction = (Line, ModNum, Input) => { return Input.indexOf(Line, Input.indexOf(Line) + 1) === -1 && Line !== "<BR>" };
                    break;
                case "emptylines":
                    TargetFunction = (Line) => { return Line.length === 0 };
                    break;
                case "withtokens":
                    TargetFunction = (Line, ModNum) => {
                        if (GetElementInTable(ModNum, "tokens") == null)
                            return false;
                        let Tokens = GetElementInTable(ModNum, "tokens").value.split("\n");
                        for (let iToken = 0; iToken < Tokens.length; iToken++) {
                            if (Line.includes(Tokens[iToken]))
                                return true;
                        }
                        return false;
                    };
                    break;
                case "without_tokens":
                    TargetFunction = (Line, ModNum) => {
                        if (GetElementInTable(ModNum, "tokens") == null)
                            return false;
                        let Tokens = GetElementInTable(ModNum, "tokens").value.split("\n");
                        for (let iToken = 0; iToken < Tokens.length; iToken++) {
                            if (Line.includes(Tokens[iToken]))
                                return false;
                        }
                        return true;
                    };
                    break;
                case "evenlines":
                    TargetFunction = (Line, ModNum, Input, LineNum) => { return LineNum % 2 === 0 };
                    break;
                case "oddlines":
                    TargetFunction = (Line, ModNum, Input, LineNum) => { return LineNum % 2 === 1 };
                    break;
                default:
                    console.log("Unknown target mode");
                    //fallthrough
                case "alltext":
                    TargetFunction = () => { return true };
                    break;
            }
            for (let iLine = 0; iLine < Input.length; iLine++) {
                if (TargetFunction(Input[iLine], ModNum, Input, iLine)) {
                    Numbers.push(iLine);
                }
            }
            return Numbers;
        }
        function compareNumSubstrings(a, b) {
            let Tokens = GetElementInTable(g_ModNum, "tokens").value;
            let A_Count = a.split(Tokens).length - 1;
            let B_Count = b.split(Tokens).length - 1;
            if (A_Count < B_Count) {
                return -1;
            } else if (A_Count > B_Count) {
                return 1;
            }
            return 0;
        }
        function EditLines(Input, ModNum, LinesToEdit) {
            let Output = Input;
            let EffectFunction;
            let Effect = GetElementInTable(ModNum, "effectselect");
            switch (Effect.value) {
                case "insertnewline":
                    EffectFunction = (Line, LineNum, ModNum) => { return Line.replaceAll(GetElementInTable(ModNum, "delim").value, "\n") };
                    break;
                case "replacetable":
                    EffectFunction = (Line, LineNum, ModNum) => {
                        let Table = GetElementInTable(ModNum, "replacetable").value.split("\n");
                        for (let iPair = 0; iPair + 1 < Table.length; iPair += 2) {
                            Line = Line.replaceAll(Table[iPair], Table[iPair + 1]);
                        }
                        return Line;
                    }
                    break;
                //can't really think of how i would go about sorting a subset of the input, but can't think of a very good use case either
                case "sort":
                    return Input.sort();
                case "sortnumstrings":
                    g_ModNum = ModNum;
                    return Input.sort(compareNumSubstrings);
                //what we put in one line depends on all the others
                case "tabtable": {
                    GetElementInTable(ModNum, "output").style.tabSize = GetElementInTable(ModNum, "desiredtabwidth").value;
                    let Buffer = Input;
                    let TabWidth = GetElementInTable(ModNum, "desiredtabwidth").value;
                    let Delimiter = GetElementInTable(ModNum, "delim").value;
                    if (!Delimiter || !TabWidth || TabWidth === "0") {
                        return [];
                    }
                    //get rid of existing tabs and spaces that come after delimiter
                    for (let iLineNum = 0; iLineNum < LinesToEdit.length; iLineNum++) {
                        let LineNum = LinesToEdit[iLineNum];
                        let Segments = Buffer[LineNum].split(Delimiter);
                        //start at one to not disturb first segment's leading whitespace (this would be, say, typical code indentation)
                        for (let iSegment = 1; iSegment < Segments.length; iSegment++) {
                            Segments[iSegment] = Segments[iSegment].trim();
                        }
                        Buffer[LineNum] = Segments.join(Delimiter);
                    }
                    //have to loop this because each iteration of tabbing changes the targetcolumns values for subsequent segments
                    let TargetColumns = [];
                    let ColNum = 0;
                    let MaxSegments = 0;
                    //find longest cell in the column and record length in targetcolumns
                    do {
                        for (let iLineNum = 0; iLineNum < LinesToEdit.length; iLineNum++) {
                            let LineNum = LinesToEdit[iLineNum];
                            let Line = Buffer[LineNum];
                            let Segments = Line.split(Delimiter);
                            MaxSegments = Math.max(Segments.length, MaxSegments);
                            let InnerSegment = Segments[ColNum];
                            let RealLength = InnerSegment.length + Delimiter.length;
                            let BestLength;
                            if (TargetColumns[ColNum]) {
                                BestLength = TargetColumns[ColNum];
                            } else {
                                BestLength = 0;
                            }
                            TargetColumns[ColNum] = Math.max(BestLength, RealLength);
                            //round to next tab interval
                            TargetColumns[ColNum] = Math.ceil(TargetColumns[ColNum] / TabWidth) * TabWidth;
                        }
                        ColNum++;
                        //-1 because last column doesn't need new tabs
                    } while (ColNum < MaxSegments - 1)
                    ColNum = 0;
                    do {
                        for (let iLineNum = 0; iLineNum < LinesToEdit.length; iLineNum++) {
                            let LineNum = LinesToEdit[iLineNum];
                            let Line = Buffer[LineNum];
                            let Segments = Line.split(Delimiter);
                            let InnerSegment = Segments[ColNum].trim();
                            //add new tabs to match targetcolumns
                            let TextColumn = InnerSegment.length + Delimiter.length;
                            let FirsTab = true;
                            while (TextColumn < TargetColumns[ColNum]) {
                                Segments[ColNum + 1] = "\t" + Segments[ColNum + 1];
                                if (FirsTab) {
                                    TextColumn += +TabWidth - (+TextColumn % +TabWidth);
                                } else {
                                    TextColumn += +TabWidth;
                                }
                                FirsTab = false;
                            }
                            Buffer[LineNum] = Segments.join(Delimiter);
                        }
                        ColNum++;
                    } while (ColNum < TargetColumns.length)
                    return Buffer;
                }
                case "prefixsuffix":
                    EffectFunction = (Line, LineNum, ModNum) => { return GetElementInTable(ModNum, "prefix").value + Line + GetElementInTable(ModNum, "suffix").value };
                    break;
                case "colext":
                    EffectFunction = (Line, LineNum, ModNum) => {
                        let Segments = Line.split(GetElementInTable(ModNum, "delim").value);
                        return Segments[Math.min(Segments.length - 1, GetElementInTable(ModNum, "colno").value)];
                    }
                    break;
                case "camelseparate":
                    EffectFunction = (Line) => { return Line.replace(/([A-Z])/g, " $1").trim() };
                    break;
                case "makelowercase":
                    EffectFunction = (Line) => { return Line.toLowerCase() };
                    break;
                case "makeuppercase":
                    EffectFunction = (Line) => { return Line.toUpperCase() };
                    break;
                case "delete":
                    EffectFunction = () => { return "texttoolinternalsignal_delete" };
                    break;
                case "clear":
                    EffectFunction = () => { return "" };
                    break;
                case "allcombos":
                    let Buffer = [];
                    let Results = [];
                    for (let i = 0; i < Input.length; i++) {
                        Buffer = [Input[i]];
                        for (let iResult = 0; iResult < Results.length; iResult++) {
                            Buffer.push("" + Results[iResult] + GetElementInTable(ModNum, "delim").value + Input[i]);
                        }
                        Results = Results.concat(Buffer);
                    }
                    return Results;
                case "reverse":
                    return Input.reverse();
                case "tabbrackets":
                    let Depth = 0;
                    let OpenChars = GetElementInTable(ModNum, "openbrackets").value;
                    let CloseChars = GetElementInTable(ModNum, "closebrackets").value;
                    for (let iLineNum = 0; iLineNum < LinesToEdit.length; iLineNum++) {
                        let LineNum = LinesToEdit[iLineNum];
                        let Line = Output[LineNum];
                        //must find closing brackets before adding tabs
                        for (let iChar = 0; iChar < CloseChars.length; iChar++) {
                            let Char = CloseChars[iChar];
                            let Hits = Line.split(Char).length - 1;
                            Depth -= Hits;
                        }
                        //add tabs
                        for (let iNumTabs = 0; iNumTabs < Depth; iNumTabs++) {
                            Output[LineNum] = "\t" + Output[LineNum];
                        }
                        //find opening brackets
                        for (let iChar = 0; iChar < OpenChars.length; iChar++) {
                            let Char = OpenChars[iChar];
                            let Hits = Line.split(Char).length - 1;
                            Depth += Hits;
                        }
                    }
                    return Output;
                case "numberlines":
                    EffectFunction = (Line, LineNum, ModNum) => { return (+LineNum + +GetElementInTable(ModNum, "startat").value) + GetElementInTable(ModNum, "delim").value + Line };
                    break;
                default:
                    console.log("Unknown effect");
                    //fallthrough
                case "copy":
                    EffectFunction = (Line) => { return Line };
                    break;
            }
            let DeletedLines = 0;
            for (let iLineNum = 0; iLineNum < LinesToEdit.length; iLineNum++) {
                let LineNum = LinesToEdit[iLineNum] - DeletedLines;
                Output[LineNum] = EffectFunction(Input[LineNum], LineNum, ModNum);
                if (Output[LineNum] === "texttoolinternalsignal_delete") {
                    Output.splice(LineNum, 1);
                    DeletedLines++;
                }
            }
            return Output;
        }
    </script>
</body>
</html>
